services:
  simulator:
    build:
      context: ..
      dockerfile: getpaid-simulator/Dockerfile
    ports:
      - "9000:9000"
    environment:
      - SIMULATOR_HOST=0.0.0.0
      - SIMULATOR_PORT=9000
      - SIMULATOR_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/sim/status"]
      interval: 10s
      timeout: 5s
      retries: 3
