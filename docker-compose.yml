services:
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - SIMULATOR_HOST=0.0.0.0
      - SIMULATOR_PORT=9000
      - SIMULATOR_LOG_LEVEL=info
    healthcheck:
      # python:3.12-slim ships no HTTP CLI tools; probe with the stdlib.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:9000/sim/status')"
      interval: 10s
      timeout: 5s
      retries: 3
